name: Update Badges

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Count tests
        id: tests
        run: |
          TESTS=$(go test ./... -count=1 -json 2>/dev/null | jq -r 'select(.Action=="pass" and .Test != null) | .Test' | wc -l | tr -d ' ')
          echo "count=${TESTS}" >> "$GITHUB_OUTPUT"
          echo "Tests passed: ${TESTS}"

      - name: Get coverage
        id: coverage
        run: |
          go test ./... -coverprofile=coverage.out -count=1 2>/dev/null
          PCT=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          echo "pct=${PCT}" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${PCT}"

      - name: Update README badges
        run: |
          TESTS="${{ steps.tests.outputs.count }}"
          COV="${{ steps.coverage.outputs.pct }}"

          # Update test count badge
          sed -i "s|tests-[0-9]*%20passed|tests-${TESTS}%20passed|g" README.md

          # Add or update coverage badge
          if grep -q "coverage-" README.md; then
            sed -i "s|coverage-[0-9.]*%25-[a-z]*|coverage-${COV//%/%25}-brightgreen|g" README.md
          fi

      - name: Create PR if changed
        run: |
          git diff --quiet README.md && { echo "No changes"; exit 0; }

          BRANCH="ci/update-badges-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add README.md
          git commit -m "ci: update badges — ${{ steps.tests.outputs.count }} tests, ${{ steps.coverage.outputs.pct }} coverage"
          git push origin "$BRANCH"
          gh pr create \
            --title "ci: update badges — ${{ steps.tests.outputs.count }} tests" \
            --body "Auto-generated badge update: ${{ steps.tests.outputs.count }} tests, ${{ steps.coverage.outputs.pct }} coverage" \
            --base main \
            --head "$BRANCH" \
            --label "automation"
          # Auto-merge (0 required reviewers)
          sleep 5
          gh pr merge "$BRANCH" --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
